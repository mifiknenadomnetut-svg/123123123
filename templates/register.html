<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — TypeRace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

<div class="auth-card">
  <a href="/" class="auth-logo">TYPE<span>RACE</span></a>
  <p class="auth-sub">Создай аккаунт и начни соревноваться</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash--{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/register" class="auth-form">
    <div class="form-group">
      <label>Имя пользователя</label>
      <input type="text" name="username" required placeholder="user123" maxlength="30">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" name="password" required placeholder="Минимум 6 символов" minlength="6">
    </div>
    <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
  </form>
  <p class="auth-switch">Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>

</body>
</html>
